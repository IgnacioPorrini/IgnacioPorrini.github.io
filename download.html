<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Descargar Archivos - Query Tab Launcher Demo</title>
    <link rel="icon" href="favicon.ico" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="css/estilos_n.css" rel="stylesheet" />

    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .download-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .download-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .download-header h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .download-header p {
            color: #b0b0b0;
            font-size: 0.95rem;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .file-icon {
            font-size: 1.5rem;
            color: #ff6b6b;
            width: 30px;
            text-align: center;
        }

        .file-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .file-name {
            font-weight: 600;
            color: #fff;
            font-size: 0.95rem;
        }

        .file-size {
            font-size: 0.8rem;
            color: #888;
        }

        .download-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
            color: white;
            text-decoration: none;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #fff;
        }

        @media (max-width: 576px) {
            .download-container {
                margin: 50px 15px;
                padding: 25px;
            }

            .download-header h1 {
                font-size: 1.5rem;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .download-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="download-container">
        <div class="download-header">
            <h1>Query Tab Launcher</h1>
            <p>Demo - Archivos para Descargar</p>
        </div>

        <div class="file-list" id="fileList">
            <!-- Los archivos se cargarán aquí mediante JavaScript -->
        </div>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left me-2"></i> Volver</a>
        </div>
    </div>

    <script>
        const files = [
            {
                name: 'qtl-config-default.json',
                path: 'qtl/qtl-config-default.json',
                icon: 'fas fa-cog'
            },
            {
                name: 'qtl-mock.html',
                path: 'qtl/qtl-mock.html',
                icon: 'fas fa-code'
            },
            {
                name: 'queue-tab-launcher.zip',
                path: 'qtl/queue-tab-launcher.zip',
                icon: 'fas fa-file-archive'
            }
        ];

        const fileList = document.getElementById('fileList');

        files.forEach(file => {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.innerHTML = `
                <div class="file-info">
                    <div class="file-icon">
                        <i class="${file.icon}"></i>
                    </div>
                    <div class="file-details">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${file.path}</div>
                    </div>
                </div>
                <a href="${file.path}" download class="download-btn">
                    <i class="fas fa-download"></i> Descargar
                </a>
            `;
            fileList.appendChild(fileItem);
        });
    </script>
</body>

</html>
