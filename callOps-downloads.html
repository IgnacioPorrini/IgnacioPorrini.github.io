<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Descargar - callOps / Queue Tab Launcher</title>
    <link rel="icon" href="favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="css/estilos_n.css" rel="stylesheet" />

    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .download-container {
            max-width: 620px;
            margin: 80px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* ── Header ── */
        .download-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .download-header .badge-label {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 4px;
            padding: 3px 10px;
            margin-bottom: 14px;
        }

        .download-header h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }

        .download-header p {
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        /* ── File list ── */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.25s ease;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.11);
            border-color: rgba(255, 107, 107, 0.35);
            transform: translateX(4px);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 13px;
            flex: 1;
        }

        .file-icon {
            font-size: 1.3rem;
            color: #ff6b6b;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }

        .file-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .file-name {
            font-weight: 600;
            color: #fff;
            font-size: 0.9rem;
        }

        .file-desc {
            font-size: 0.75rem;
            color: #888;
        }

        /* ── Individual download button ── */
        .download-btn {
            padding: 7px 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.85rem;
            font-weight: 500;
            flex-shrink: 0;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
            color: white;
            text-decoration: none;
        }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 24px 0 20px;
        }

        /* ── Download all button ── */
        .download-all-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-decoration: none;
        }

        .download-all-btn:hover {
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.45);
            transform: translateY(-2px);
            color: white;
            text-decoration: none;
        }

        .download-all-btn:active {
            transform: translateY(0);
        }

        .download-all-btn.downloading {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ── Footer ── */
        .back-link {
            text-align: center;
            margin-top: 28px;
        }

        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.25s ease;
        }

        .back-link a:hover { color: #fff; }

        .credit {
            text-align: center;
            margin-top: 14px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.04em;
        }

        .credit a {
            color: #666;
            text-decoration: none;
            transition: color 0.2s;
        }

        .credit a:hover { color: #ff6b6b; }

        /* ── Responsive ── */
        @media (max-width: 576px) {
            .download-container {
                margin: 40px 15px;
                padding: 24px;
            }

            .download-header h1 { font-size: 1.5rem; }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .download-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="download-container">

        <div class="download-header">
            <div class="badge-label">callOps</div>
            <h1>Queue Tab Launcher</h1>
            <p>Extensión de Chrome para agentes de Contact Center.<br>Descargá los archivos del proyecto.</p>
        </div>

        <div class="file-list" id="fileList">
            <!-- Generado por JS -->
        </div>

        <hr class="divider">

        <a class="download-all-btn" id="btnDownloadAll" href="#">
            <i class="fas fa-download"></i> Descargar todo
        </a>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left me-2"></i> Volver</a>
        </div>

        <div class="credit">
            <a href="https://ignacioporrini.github.io/" target="_blank">✦ Ignacio Porrini</a>
        </div>

    </div>

    <script>
        const files = [
            {
                name: 'queue-tab-launcher.zip',
                desc: 'Extensión de Chrome — carpeta lista para cargar',
                path: 'callops/queue-tab-launcher.zip',
                icon: 'fas fa-puzzle-piece'
            },
            {
                name: 'qtl-config-default.json',
                desc: 'Plantilla de configuración de colas',
                path: 'callops/qtl-config-default.json',
                icon: 'fas fa-cog'
            },
            {
                name: 'call-notes.html',
                desc: 'App de notas por llamada (standalone)',
                path: 'callops/call-notes.html',
                icon: 'fas fa-sticky-note'
            },
            {
                name: 'qtl-mock.html',
                desc: 'Mock del sistema de Contact Center',
                path: 'callops/qtl-mock.html',
                icon: 'fas fa-code'
            }
        ];

        // Render file list
        const fileList = document.getElementById('fileList');

        files.forEach(file => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <div class="file-info">
                    <div class="file-icon"><i class="${file.icon}"></i></div>
                    <div class="file-details">
                        <div class="file-name">${file.name}</div>
                        <div class="file-desc">${file.desc}</div>
                    </div>
                </div>
                <a href="${file.path}" download class="download-btn">
                    <i class="fas fa-download"></i> Descargar
                </a>
            `;
            fileList.appendChild(item);
        });

        // Download all
        document.getElementById('btnDownloadAll').addEventListener('click', function (e) {
            e.preventDefault();
            const btn = this;
            btn.classList.add('downloading');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Descargando...';

            files.forEach((file, index) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = file.path;
                    a.download = file.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    if (index === files.length - 1) {
                        setTimeout(() => {
                            btn.classList.remove('downloading');
                            btn.innerHTML = '<i class="fas fa-check"></i> Listo';
                            setTimeout(() => {
                                btn.innerHTML = '<i class="fas fa-download"></i> Descargar todo';
                            }, 2000);
                        }, 500);
                    }
                }, index * 600);
            });
        });
    </script>
</body>

</html>
